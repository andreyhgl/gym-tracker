<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Log — Gym Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --card: #161616;
    --card-hover: #1c1c1c;
    --border: #2a2a2a;
    --text: #e8e4dd;
    --text-dim: #7a7670;
    --accent: #e2ff3a;
    --accent-dim: rgba(226, 255, 58, 0.08);
    --done: #2a3a10;
    --done-border: #3d5216;
    --red: #ff4d4d;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 100px;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 540px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    padding: 32px 0 12px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.2rem;
    letter-spacing: 3px;
    color: var(--accent);
    line-height: 1;
  }

  header p {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  .progress-bar-container {
    margin: 28px 0 32px;
    position: relative;
  }

  .progress-stats {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }

  .progress-stats .count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .progress-stats .percent {
    font-size: 0.8rem;
    color: var(--text-dim);
    font-weight: 500;
  }

  .progress-track {
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    width: 0%;
    transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .muscle-group {
    margin-bottom: 24px;
  }

  .muscle-group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    cursor: pointer;
    user-select: none;
    padding: 0 4px;
  }

  .muscle-group-header .icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--accent-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.95rem;
    flex-shrink: 0;
  }

  .muscle-group-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.25rem;
    letter-spacing: 1.5px;
    color: var(--text);
    flex: 1;
  }

  .muscle-group-header .group-count {
    font-size: 0.7rem;
    color: var(--text-dim);
    background: var(--card);
    padding: 3px 8px;
    border-radius: 99px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .muscle-group-header .chevron {
    color: var(--text-dim);
    transition: transform 0.3s ease;
    font-size: 0.8rem;
  }

  .muscle-group-header.collapsed .chevron {
    transform: rotate(-90deg);
  }

  .exercise-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
    transition: max-height 0.4s ease, opacity 0.3s ease;
  }

  .exercise-list.collapsed {
    max-height: 0 !important;
    opacity: 0;
    pointer-events: none;
  }

  .exercise-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .exercise-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: transparent;
    transition: background 0.3s ease;
  }

  .exercise-item:hover {
    background: var(--card-hover);
    border-color: #333;
  }

  .exercise-item.done {
    background: var(--done);
    border-color: var(--done-border);
  }

  .exercise-item.done::before {
    background: var(--accent);
  }

  .exercise-item.done .exercise-name {
    color: var(--text-dim);
    text-decoration: line-through;
    text-decoration-color: var(--text-dim);
  }

  .custom-check {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s ease;
  }

  .exercise-item.done .custom-check {
    background: var(--accent);
    border-color: var(--accent);
  }

  .custom-check svg {
    width: 13px;
    height: 13px;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.2s ease;
  }

  .exercise-item.done .custom-check svg {
    opacity: 1;
    transform: scale(1);
  }

  .exercise-info {
    flex: 1;
    min-width: 0;
  }

  .exercise-name {
    font-weight: 600;
    font-size: 0.92rem;
    color: var(--text);
    transition: all 0.3s ease;
  }

  .exercise-meta {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 2px;
    letter-spacing: 0.3px;
  }

  .exercise-item.done .exercise-meta {
    opacity: 0.5;
  }

  .reset-btn {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--card);
    color: var(--red);
    border: 1px solid #3a1a1a;
    padding: 12px 28px;
    border-radius: 99px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.25s ease;
    opacity: 0;
    pointer-events: none;
    z-index: 10;
  }

  .reset-btn.visible {
    opacity: 1;
    pointer-events: all;
  }

  .reset-btn:hover {
    background: #2a1010;
    border-color: var(--red);
  }

  .celebration {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .celebration.active {
    opacity: 1;
  }

  .celebration-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    color: var(--accent);
    letter-spacing: 4px;
    text-shadow: 0 0 40px rgba(226, 255, 58, 0.4);
    animation: pulse 0.6s ease-out;
  }

  @keyframes pulse {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes checkBounce {
    0% { transform: scale(1); }
    40% { transform: scale(1.12); }
    100% { transform: scale(1); }
  }

  .exercise-item.just-checked {
    animation: checkBounce 0.3s ease;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>IRON LOG</h1>
    <p id="dateDisplay"></p>
  </header>

  <div class="progress-bar-container">
    <div class="progress-stats">
      <span class="count" id="progressCount">0 / 0</span>
      <span class="percent" id="progressPercent">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div id="workoutList"></div>
</div>

<button class="reset-btn" id="resetBtn" onclick="resetAll()">RESET WORKOUT</button>

<div class="celebration" id="celebration">
  <div class="celebration-text">WORKOUT COMPLETE 💪</div>
</div>

<script>
const WORKOUT = [
  {
    group: "Chest",
    icon: "🫁",
    exercises: [
      { name: "Bench Press", meta: "4 × 8 reps" },
      { name: "Incline Dumbbell Press", meta: "3 × 10 reps" },
      { name: "Cable Flyes", meta: "3 × 12 reps" },
      { name: "Push-Ups", meta: "3 × failure" },
    ]
  },
  {
    group: "Back",
    icon: "🦴",
    exercises: [
      { name: "Deadlift", meta: "4 × 5 reps" },
      { name: "Pull-Ups", meta: "4 × 8 reps" },
      { name: "Barbell Row", meta: "3 × 10 reps" },
      { name: "Face Pulls", meta: "3 × 15 reps" },
    ]
  },
  {
    group: "Legs",
    icon: "🦵",
    exercises: [
      { name: "Barbell Squat", meta: "4 × 6 reps" },
      { name: "Romanian Deadlift", meta: "3 × 10 reps" },
      { name: "Leg Press", meta: "3 × 12 reps" },
      { name: "Walking Lunges", meta: "3 × 12 each" },
      { name: "Calf Raises", meta: "4 × 15 reps" },
    ]
  },
  {
    group: "Shoulders",
    icon: "💪",
    exercises: [
      { name: "Overhead Press", meta: "4 × 8 reps" },
      { name: "Lateral Raises", meta: "4 × 12 reps" },
      { name: "Rear Delt Flyes", meta: "3 × 15 reps" },
    ]
  },
  {
    group: "Arms",
    icon: "🏋️",
    exercises: [
      { name: "Barbell Curl", meta: "3 × 10 reps" },
      { name: "Tricep Dips", meta: "3 × 12 reps" },
      { name: "Hammer Curls", meta: "3 × 12 reps" },
      { name: "Skull Crushers", meta: "3 × 10 reps" },
    ]
  },
  {
    group: "Core",
    icon: "🎯",
    exercises: [
      { name: "Hanging Leg Raises", meta: "3 × 12 reps" },
      { name: "Cable Crunches", meta: "3 × 15 reps" },
      { name: "Plank", meta: "3 × 60 sec" },
    ]
  }
];

const STORAGE_KEY = 'iron-log-state';
let state = {};

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const today = new Date().toDateString();
    if (saved.date === today) {
      state = saved.checked || {};
    } else {
      state = {};
    }
  } catch { state = {}; }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    date: new Date().toDateString(),
    checked: state
  }));
}

function getKey(gi, ei) { return `${gi}-${ei}`; }

function getTotalExercises() {
  return WORKOUT.reduce((s, g) => s + g.exercises.length, 0);
}

function getDoneCount() {
  return Object.values(state).filter(Boolean).length;
}

function updateProgress() {
  const total = getTotalExercises();
  const done = getDoneCount();
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  document.getElementById('progressCount').textContent = `${done} / ${total}`;
  document.getElementById('progressPercent').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;

  const resetBtn = document.getElementById('resetBtn');
  if (done > 0) resetBtn.classList.add('visible');
  else resetBtn.classList.remove('visible');

  if (done === total && total > 0) {
    const cel = document.getElementById('celebration');
    cel.classList.add('active');
    setTimeout(() => cel.classList.remove('active'), 2500);
  }

  // Update group counts
  WORKOUT.forEach((group, gi) => {
    const groupDone = group.exercises.filter((_, ei) => state[getKey(gi, ei)]).length;
    const countEl = document.querySelector(`[data-group-count="${gi}"]`);
    if (countEl) countEl.textContent = `${groupDone}/${group.exercises.length}`;
  });
}

function toggleExercise(gi, ei) {
  const key = getKey(gi, ei);
  state[key] = !state[key];
  saveState();

  const el = document.querySelector(`[data-key="${key}"]`);
  if (state[key]) {
    el.classList.add('done', 'just-checked');
    setTimeout(() => el.classList.remove('just-checked'), 300);
  } else {
    el.classList.remove('done');
  }

  updateProgress();
}

function toggleGroup(gi) {
  const header = document.querySelector(`[data-group-header="${gi}"]`);
  const list = document.querySelector(`[data-group-list="${gi}"]`);
  header.classList.toggle('collapsed');
  list.classList.toggle('collapsed');
}

function render() {
  const today = new Date();
  document.getElementById('dateDisplay').textContent = today.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  const container = document.getElementById('workoutList');
  container.innerHTML = '';

  WORKOUT.forEach((group, gi) => {
    const section = document.createElement('div');
    section.className = 'muscle-group';

    const groupDone = group.exercises.filter((_, ei) => state[getKey(gi, ei)]).length;

    section.innerHTML = `
      <div class="muscle-group-header" data-group-header="${gi}" onclick="toggleGroup(${gi})">
        <div class="icon">${group.icon}</div>
        <h2>${group.group.toUpperCase()}</h2>
        <span class="group-count" data-group-count="${gi}">${groupDone}/${group.exercises.length}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="exercise-list" data-group-list="${gi}">
        ${group.exercises.map((ex, ei) => {
          const key = getKey(gi, ei);
          const done = state[key] ? 'done' : '';
          return `
            <div class="exercise-item ${done}" data-key="${key}" onclick="toggleExercise(${gi}, ${ei})">
              <div class="custom-check">
                <svg viewBox="0 0 12 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M1 5L4.5 8.5L11 1" stroke="#0e0e0e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div class="exercise-info">
                <div class="exercise-name">${ex.name}</div>
                <div class="exercise-meta">${ex.meta}</div>
              </div>
            </div>`;
        }).join('')}
      </div>`;

    container.appendChild(section);
  });

  updateProgress();
}

function resetAll() {
  state = {};
  saveState();
  render();
}

loadState();
render();
</script>
</body>
</html>
